id: notebook
name: "Notebook & Data Science"
description: "Full data science notebook stack with widgets, nbconvert, and pandas"
archetypes: []
requires_groups:
  - jupyter
  - dataviz
platform_filter: null

dependencies:
  notebook:
    - "nbconvert>=7.16.0"
    - "nbformat>=5.10.0"
    - "ipywidgets>=8.1.0"
    - "pandas>=2.2.0"
    - "numpy>=2.2.0"

scaffolded_files:
  - template_fragment: "notebooks"
    destination: "."
    description: "notebooks/ directory with example notebook and .gitkeep"

pyproject_tool_config: {}
