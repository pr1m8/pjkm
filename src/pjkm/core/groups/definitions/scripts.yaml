id: scripts
name: "Scripts & CLI Tools"
description: "Click/Typer CLI, task runners, and common scripting utilities"
archetypes: []
requires_groups: []
platform_filter: null

dependencies:
  scripts:
    - "typer[all]>=0.15.0"
    - "click>=8.1.0"
    - "shellingham>=1.5.0"
    - "python-dotenv>=1.1.0"
    - "invoke>=2.2.0"

scaffolded_files:
  - template_fragment: "scripts_cli"
    destination: "."
    description: "scripts/ directory with example CLI script"

pyproject_tool_config: {}
