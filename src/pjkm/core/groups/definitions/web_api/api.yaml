id: api
name: "API Framework"
description: "FastAPI with Uvicorn, Pydantic settings, and CORS middleware"
category: "Web & API"
archetypes:
  - service
requires_groups: []
platform_filter: null

dependencies:
  api:
    - "fastapi>=0.115.0"
    - "uvicorn[standard]>=0.34.0"
    - "pydantic-settings>=2.7.0"
    - "python-multipart>=0.0.20"

scaffolded_files:
  - template_fragment: "settings_module"
    destination: "."
    description: "Core settings module with .env support and Pydantic Settings"
  - template_fragment: "api_app"
    destination: "."
    description: "FastAPI app factory, routes, middleware, health checks, lifespan"

pyproject_tool_config: {}
