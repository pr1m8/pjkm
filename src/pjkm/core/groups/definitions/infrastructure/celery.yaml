id: celery
name: "Celery Task Queue"
description: "Celery distributed task queue with Redis broker and Flower monitoring"
category: "Infrastructure"
archetypes:
  - service
  - poly_repo
requires_groups: []
platform_filter: null

dependencies:
  celery:
    - "celery[redis]>=5.5.0"
    - "flower>=2.0.0"
    - "redis[hiredis]>=5.2.0"

scaffolded_files:
  - template_fragment: "celery_worker"
    destination: "."
    description: "Celery app config, worker entry point, beat schedule, compose.celery.yaml"

pyproject_tool_config: {}
