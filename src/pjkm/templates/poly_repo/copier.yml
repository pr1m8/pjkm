_min_copier_version: "9.0.0"
_subdirectory: "template"

project_name:
  type: str
  help: "Project name"

project_slug:
  type: str
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') | replace('.', '_') }}"

python_version:
  type: str
  default: "3.13"

author_name:
  type: str
  default: ""

author_email:
  type: str
  default: ""

description:
  type: str
  default: ""

groups:
  type: json
  default: []
