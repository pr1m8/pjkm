id: testing
name: "Testing"
description: "pytest with coverage, mock, and common plugins"
archetypes: []
requires_groups: []
platform_filter: null

dependencies:
  testing:
    - "pytest>=9.0.0"
    - "pytest-cov>=7.0.0"
    - "pytest-mock>=3.15.0"
    - "pytest-asyncio>=1.0.0"

scaffolded_files: []

pyproject_tool_config:
  pytest.ini_options:
    testpaths: ["tests"]
    addopts: "--cov --cov-report=html --cov-report=term-missing"
