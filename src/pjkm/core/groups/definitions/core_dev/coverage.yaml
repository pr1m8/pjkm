id: coverage
name: "Code Coverage"
description: "Coverage.py with HTML reports and minimum thresholds"
category: "Core Dev"
archetypes: []
requires_groups:
  - testing
platform_filter: null

dependencies:
  coverage:
    - "coverage[toml]>=7.8.0"

scaffolded_files: []

pyproject_tool_config:
  coverage.run:
    source: ["src"]
    branch: true
  coverage.report:
    fail_under: 85
    show_missing: true
