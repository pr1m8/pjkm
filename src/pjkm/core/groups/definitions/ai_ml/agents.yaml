id: agents
name: "AI Agent Framework"
description: "Agent orchestration with LangGraph, tool calling, memory, and structured output"
category: "AI / ML"
archetypes: []
requires_groups:
  - langchain
  - langgraph
platform_filter: null

dependencies:
  agents:
    - "langchain>=0.3.0"
    - "langchain-core>=0.3.0"
    - "langgraph>=1.0.0"
    - "langgraph-sdk>=0.3.0"
    - "langgraph-prebuilt>=1.0.0"
    - "langsmith>=0.7.0"
    - "langmem>=0.0.30"
    - "pydantic>=2.11.0"

scaffolded_files:
  - template_fragment: "agent_app"
    destination: "."
    description: "LangGraph agent with tools, memory, state, and structured output"

pyproject_tool_config: {}
