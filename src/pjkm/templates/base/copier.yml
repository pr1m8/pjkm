_min_copier_version: "9.0.0"
_subdirectory: "template"

project_name:
  type: str
  help: "Project name"

project_slug:
  type: str
  help: "Python package name (auto-derived)"
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') | replace('.', '_') }}"

description:
  type: str
  help: "Short project description"
  default: ""

author_name:
  type: str
  help: "Author name"
  default: ""

author_email:
  type: str
  help: "Author email"
  default: ""

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.13"

license:
  type: str
  help: "License type"
  default: "MIT"

groups:
  type: json
  default: []
